# ASP.NET Core
# Build and test ASP.NET Core projects targeting .NET Core.
# Add steps that run tests, create a NuGet package, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core
trigger:
- main
pool:
  vmImage: ubuntu-latest
variables:
  buildConfiguration: 'Release'

steps:
- script: |
    cd SupervisorMobility.Client  # Change to the directory containing your .NET Core app
    dotnet restore
    dotnet build --configuration $(buildConfiguration)
  displayName: 'Build .NET 6 app'

- script: |
    cd SupervisorMobility.Client  # Change to the directory containing your .NET Core app
    dotnet publish -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/app
  displayName: 'Publish Blazor app'

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/app'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
  displayName: 'Create ZIP Archive'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
    ArtifactName: 'blazor-app-artifact'
    publishLocation: 'Container'
  displayName: 'Publish ZIP Artifact'

- task: DownloadBuildArtifacts@0
  inputs:
    artifactName: 'blazor-app-artifact'  # The name of the artifact to download
    downloadPath: '$(System.ArtifactsDirectory)'  # The destination directory for the downloaded artifact
  displayName: 'Download ZIP Artifact'